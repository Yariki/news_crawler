apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "news-crawler.backend.fullname" . }}
  labels:
    {{- include "news-crawler.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "news-crawler.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "news-crawler.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: db-migrate
          image: {{ printf "%s:%s" .Values.backend.image.repository .Values.backend.image.tag | quote }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: {{ include "news-crawler.backend.configmapName" . }}
            - secretRef:
                name: {{ include "news-crawler.backend.secretName" . }}
      containers:
        - name: backend
          image: {{ printf "%s:%s" .Values.backend.image.repository .Values.backend.image.tag | quote }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "news-crawler.backend.configmapName" . }}
            - secretRef:
                name: {{ include "news-crawler.backend.secretName" . }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}