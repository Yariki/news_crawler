nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

global:
  storageClass: ""

backend:
  replicaCount: 1
  image:
    repository: news-crawler-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8000
  config:
    appMode: prod
    corsOrigins: https://news-monitor.example.com
    defaultKeywords: war,attack,missile,drone,война,атака,обстрел,удар,дрон
    elasticsearchUrl: ""
  secret:
    databaseUrl: ""
  resources: {}

frontend:
  replicaCount: 1
  image:
    repository: news-crawler-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 80
  ingress:
    enabled: true
    className: nginx
    host: news-monitor.example.com
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    tls:
      enabled: false
      secretName: news-monitor-tls
  resources: {}

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  database: news_monitor
  username: news_user
  password: change-me
  persistence:
    enabled: true
    size: 8Gi
  resources: {}

elasticsearch:
  enabled: true
  image:
    repository: docker.elastic.co/elasticsearch/elasticsearch
    tag: 8.15.5
    pullPolicy: IfNotPresent
  service:
    port: 9200
  javaOpts: -Xms512m -Xmx512m
  persistence:
    enabled: true
    size: 10Gi
  resources: {}

kibana:
  enabled: false
  image:
    repository: docker.elastic.co/kibana/kibana
    tag: 8.13.4
    pullPolicy: IfNotPresent
  service:
    port: 5601
  resources: {}