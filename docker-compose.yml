services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: news_crawler_app
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DEFAULT_KEYWORDS: ${DEFAULT_KEYWORDS}
      APP_MODE: ${APP_MODE}
      CRAWL_DELAY: ${CRAWL_DELAY}
      REQUEST_RATE: ${REQUEST_RATE:-10}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      CELERY_TASK_QUEUE: ${CELERY_TASK_QUEUE:-scheduler.checks}
      CHECKER_TIMEOUT_SECONDS: ${CHECKER_TIMEOUT_SECONDS:-30}
      BEAT_TICK_SECONDS: ${BEAT_TICK_SECONDS:-10}
      BEAT_BATCH_SIZE: ${BEAT_BATCH_SIZE:-50}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: news_crawler_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-news_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-news_password}
      POSTGRES_DB: ${POSTGRES_DB:-news_monitor}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-news_user} -d ${POSTGRES_DB:-news_monitor}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: news_crawler_elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: news_crawler_kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: news_crawler_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: news_crawler_celery_worker
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      RABBITMQ_URL: ${CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672/}
      CELERY_TASK_QUEUE: ${CELERY_TASK_QUEUE:-scheduler.checks}
      CHECKER_TIMEOUT_SECONDS: ${CHECKER_TIMEOUT_SECONDS:-30}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
    command: celery -A app.schedule.celery_app:celery_app worker --loglevel=info -Q ${CELERY_TASK_QUEUE:-scheduler.checks}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: news_crawler_celery_beat
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      RABBITMQ_URL: ${CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672/}
      CELERY_TASK_QUEUE: ${CELERY_TASK_QUEUE:-scheduler.checks}
      BEAT_TICK_SECONDS: ${BEAT_TICK_SECONDS:-10}
      BEAT_BATCH_SIZE: ${BEAT_BATCH_SIZE:-50}
    command: celery -A app.schedule.celery_beat beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  elasticsearch_data:
