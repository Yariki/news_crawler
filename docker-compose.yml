services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: news_monitor
      POSTGRES_USER: news_user
      POSTGRES_PASSWORD: news_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news_user -d news_monitor"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.5
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
    ports:
      - "5601:5601"
    restart: unless-stopped
    
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://news_user:news_password@postgres:5432/news_monitor
      ELASTICSEARCH_URL: http://elasticsearch:9200
      CORS_ORIGINS: http://localhost:5173
      DEFAULT_KEYWORDS: war,attack,missile,drone,война,атака,обстрел,удар,дрон
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      target: build
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      HOME: /tmp/rabbitmq
      RABBITMQ_DATA_DIR: /tmp/rabbitmq
      RABBITMQ_ERLANG_COOKIE: url-health-platform-cookie
    tmpfs:
      - /tmp/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10


volumes:
  postgres_data:
  es_data:
