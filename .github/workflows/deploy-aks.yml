name: Deploy To AKS

# Branch → environment mapping:
#   develop  → dev    (news-crawler-dev namespace)
#   staging  → test   (news-crawler-test namespace)
#   main     → prod   (news-crawler namespace)
#
# Each environment uses its own GitHub Environment (dev / test / prod) so that
# secrets and variables are scoped per-environment.
#
# Required per-environment GitHub secrets:
#   AZURE_CREDENTIALS   – service principal JSON with AKS/ACR permissions
#   POSTGRES_PASSWORD   – database password for this environment
#
# Required per-environment GitHub variables:
#   AZURE_RESOURCE_GROUP       – resource group containing the AKS cluster
#   AZURE_AKS_CLUSTER_NAME     – AKS cluster name
#   AZURE_CONTAINER_REGISTRY   – ACR name (short name, not login server)
#   AKS_INGRESS_HOST           – public hostname for the ingress (without scheme)

on:
  push:
    branches:
      - main
      - staging
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - prod

env:
  HELM_RELEASE: news-crawler
  HELM_CHART_PATH: k8s/news-crawler
  BACKEND_IMAGE_NAME: news-crawler-backend
  FRONTEND_IMAGE_NAME: news-crawler-frontend

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Determine environment name and all environment-specific parameters.
  # Outputs are consumed by the deploy job below.
  # ──────────────────────────────────────────────────────────────────────────
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      environment:      ${{ steps.params.outputs.environment }}
      namespace:        ${{ steps.params.outputs.namespace }}
      values_file:      ${{ steps.params.outputs.values_file }}
      postgres_database: ${{ steps.params.outputs.postgres_database }}
      postgres_username: ${{ steps.params.outputs.postgres_username }}
      ingress_scheme:   ${{ steps.params.outputs.ingress_scheme }}
    steps:
      - name: Resolve deployment parameters
        id: params
        shell: bash
        run: |
          set -euo pipefail

          # Determine the logical environment name
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ inputs.environment }}"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            ENV="prod"
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            ENV="test"
          else
            ENV="dev"
          fi

          case "$ENV" in
            prod)
              NAMESPACE="news-crawler"
              VALUES_FILE="k8s/news-crawler/values.prod.yaml"
              PG_DB="news_monitor"
              PG_USER="news_user"
              SCHEME="https"
              ;;
            test)
              NAMESPACE="news-crawler-test"
              VALUES_FILE="k8s/news-crawler/values.test.yaml"
              PG_DB="news_monitor_test"
              PG_USER="news_user_test"
              SCHEME="https"
              ;;
            dev)
              NAMESPACE="news-crawler-dev"
              VALUES_FILE="k8s/news-crawler/values.dev.yaml"
              PG_DB="news_monitor_dev"
              PG_USER="news_user_dev"
              SCHEME="http"
              ;;
            *)
              echo "Unknown environment: $ENV" && exit 1
              ;;
          esac

          echo "environment=$ENV"         >> "$GITHUB_OUTPUT"
          echo "namespace=$NAMESPACE"     >> "$GITHUB_OUTPUT"
          echo "values_file=$VALUES_FILE" >> "$GITHUB_OUTPUT"
          echo "postgres_database=$PG_DB" >> "$GITHUB_OUTPUT"
          echo "postgres_username=$PG_USER" >> "$GITHUB_OUTPUT"
          echo "ingress_scheme=$SCHEME"   >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────
  # Build images and deploy to the resolved environment.
  # The "environment:" key scopes all secrets/vars to the correct GitHub
  # Environment (dev / test / prod).
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    needs: resolve-env
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.environment }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ vars.AZURE_AKS_CLUSTER_NAME }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Registry And Image Tag
        shell: bash
        run: |
          set -euo pipefail
          echo "ACR_LOGIN_SERVER=$(az acr show --name '${{ vars.AZURE_CONTAINER_REGISTRY }}' --query loginServer -o tsv)" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      - name: Login To ACR
        shell: bash
        run: az acr login --name "${{ vars.AZURE_CONTAINER_REGISTRY }}"

      - name: Build And Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Build And Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Helm Upgrade
        shell: bash
        env:
          NAMESPACE:        ${{ needs.resolve-env.outputs.namespace }}
          VALUES_FILE:      ${{ needs.resolve-env.outputs.values_file }}
          PG_DATABASE:      ${{ needs.resolve-env.outputs.postgres_database }}
          PG_USERNAME:      ${{ needs.resolve-env.outputs.postgres_username }}
          INGRESS_SCHEME:   ${{ needs.resolve-env.outputs.ingress_scheme }}
          INGRESS_HOST:     ${{ vars.AKS_INGRESS_HOST }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          set -euo pipefail
          helm upgrade --install "$HELM_RELEASE" "$HELM_CHART_PATH" \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --wait \
            --timeout 15m \
            -f "$HELM_CHART_PATH/values.yaml" \
            -f "$VALUES_FILE" \
            --set-string backend.image.repository="$ACR_LOGIN_SERVER/$BACKEND_IMAGE_NAME" \
            --set-string backend.image.tag="$IMAGE_TAG" \
            --set-string frontend.image.repository="$ACR_LOGIN_SERVER/$FRONTEND_IMAGE_NAME" \
            --set-string frontend.image.tag="$IMAGE_TAG" \
            --set-string frontend.ingress.host="$INGRESS_HOST" \
            --set-string backend.config.corsOrigins="${INGRESS_SCHEME}://${INGRESS_HOST}" \
            --set-string postgres.database="$PG_DATABASE" \
            --set-string postgres.username="$PG_USERNAME" \
            --set-string postgres.password="$POSTGRES_PASSWORD"